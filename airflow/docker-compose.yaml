# Self-hosted Airflow (LocalExecutor) for the load-forecasting pipeline.
#
# Usage (from repo root):
#   docker build -f airflow/Dockerfile -t load-forecasting-airflow .
#   cd airflow && cp .env.example .env   # then fill in EIA_API_KEY, S3_BUCKET, AWS creds
#   docker compose up airflow-init       # one-time DB init + admin user
#   docker compose up -d                 # start scheduler + webserver (http://localhost:8080)
#
# On EC2 the AWS credentials are best supplied via the instance IAM role rather
# than AWS_ACCESS_KEY_ID/SECRET; leave those blank in .env when running on EC2.

x-airflow-common: &airflow-common
  image: load-forecasting-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    PYTHONPATH: /opt/load-forecasting
    # Forecasting app configuration (read by src/config.py)
    STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
    S3_BUCKET: ${S3_BUCKET:-}
    S3_PREFIX: ${S3_PREFIX:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    EIA_API_KEY: ${EIA_API_KEY:-}
    EIA_BASE_URL: ${EIA_BASE_URL:-https://api.eia.gov/v2}
    EIA_DAILY_TIMEZONE: ${EIA_DAILY_TIMEZONE:-Eastern}
    DEFAULT_HISTORY_START: ${DEFAULT_HISTORY_START:-2023-01-01T00:00:00Z}
    FORECAST_MODEL: xgboost
    XGB_TEST_FRACTION: ${XGB_TEST_FRACTION:-0.2}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: on-failure

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

volumes:
  postgres-db:
  airflow-logs:
